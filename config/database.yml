default: &default
  encoding: unicode
  adapter: postgis
  # Must be >= Puma max threads per process (see config/puma.rb). Override with DB_POOL.
  pool: <%= ENV['PUMA_MAX_THREADS'] || 5 %>
  timeout: 5000
  host: "<%= ENV['POSTGRES_HOST'] %>"
  database: "<%= ENV['POSTGRES_DBNAME'] %>"
  port: "<%= ENV['POSTGRES_PORT'] %>"
  username: "<%= ENV['POSTGRES_USER'] %>"
  password: "<%= ENV['POSTGRES_PASSWORD'] %>"

development:
  <<: *default

test:
  <<: *default
  database: "<%= ENV['POSTGRES_TEST_DBNAME'] %>"

staging:
  <<: *default 

production:
  <<: *default


